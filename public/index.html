<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment Wall App</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configuración personalizada de Tailwind para temática Starbucks -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sb: {
                            green: '#00704A',  /* Verde principal clásico */
                            dark: '#1E3932',   /* Verde oscuro */
                            gold: '#CBA258',   /* Dorado */
                            light: '#F5F5F0'   /* Fondo crema muy suave */
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body
    class="bg-sb-light min-h-screen text-slate-800 font-sans antialiased text-sm sm:text-base selection:bg-sb-green/20 selection:text-sb-dark">

    <main class="max-w-3xl mx-auto py-10 px-4 sm:px-6">

        <header class="mb-8 text-center sm:text-left transition-all">
            <h1
                class="text-3xl font-extrabold tracking-tight text-sb-dark sm:text-4xl flex items-center justify-center sm:justify-start gap-3">
                Comment Wall
            </h1>
            <p class="mt-2 text-lg text-sb-green font-medium">
                Comparte tu experiencia.
            </p>
        </header>

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-7 mb-10 ring-1 ring-sb-dark/5">
            <form id="comment-form" class="space-y-5">

                <div>
                    <label for="username" class="block text-sm font-bold text-sb-dark mb-1">Nombre <span
                            class="text-red-500">*</span></label>
                    <input type="text" id="username" name="username" placeholder="Ej. Juan Perez"
                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sb-dark focus:bg-white focus:ring-2 focus:ring-sb-green focus:border-sb-green outline-none transition-all duration-200"
                        required>
                </div>

                <div>
                    <label for="message" class="block text-sm font-bold text-sb-dark mb-1">Comentario <span
                            class="text-red-500">*</span></label>
                    <textarea id="message" name="message" rows="3"
                        placeholder="¿Qué te pareció el curso hoy? (mínimo 5 letras)"
                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sb-dark focus:bg-white focus:ring-2 focus:ring-sb-green focus:border-sb-green outline-none transition-all duration-200 resize-none"
                        required minlength="5"></textarea>
                </div>

                <div id="form-error"
                    class="hidden text-sm font-medium text-red-700 bg-red-50 p-3 rounded-lg border border-red-200 flex items-center gap-2">
                    <svg class="w-5 h-5 text-red-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <span id="form-error-text"></span>
                </div>

                <div class="flex items-center justify-end pt-2">
                    <button type="submit" id="submit-btn"
                        class="inline-flex items-center justify-center px-6 py-2.5 border border-transparent text-sm font-bold rounded-lg text-white bg-sb-green hover:bg-sb-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sb-green transition-all duration-200 shadow-sm disabled:opacity-70 disabled:cursor-not-allowed group">
                        <span id="submit-btn-text">Publicar Comentario</span>
                    </button>
                </div>
            </form>
        </section>

        <section>
            <div class="flex items-center justify-between mb-5 px-1">
                <h2 class="text-xl font-extrabold text-sb-dark">Comentarios Recientes</h2>
                <div
                    class="bg-sb-green/10 text-sb-dark py-1 px-3 rounded-full text-xs font-bold ring-1 ring-sb-green/20">
                    <span id="comments-count">0</span>
                </div>
            </div>

            <div id="comments-list" class="space-y-4 max-h-[55vh] overflow-y-auto pr-2 custom-scrollbar pb-4 relative">
                <div id="empty-state"
                    class="text-center py-16 bg-white rounded-2xl border border-slate-200 border-dashed">
                    <svg class="mx-auto h-12 w-12 text-sb-gold/70 mb-4 animate-pulse" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                    <p class="text-sm font-bold text-sb-dark/70">Conectando con la API...</p>
                </div>
            </div>
        </section>

    </main>

</body>

</html>
